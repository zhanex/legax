# Self-hosted Legax relay 配置。
# 复制到 /etc/legax-relay/config.yaml（install.sh 会用自动生成的密钥为你完成）。
# 运行中的 relay 只读取这个 YAML，不存在环境变量文件层。

sessionId: default

relay:
  host: 0.0.0.0
  port: 8787
  publicBaseUrl: https://YOUR_RELAY_HOST              # Telegram Mini App 使用的公网 HTTPS 地址
  secret: replace-with-a-long-random-secret           # 必填；与桌面端 transports[type=relay].secret 一致
  storePath: /var/lib/legax-relay/relay-store.json
  audit:
    enabled: true
    path: /var/lib/legax-relay/relay-audit.jsonl
    maxTail: 1000
    textPreview: 0
