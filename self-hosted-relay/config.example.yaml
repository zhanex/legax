# Self-hosted Legax relay configuration.
# Copy to /etc/legax-relay/config.yaml (the install.sh script does
# this for you with auto-generated secrets). The running relay reads ONLY this
# YAML — there is no environment-file layer.

sessionId: default

relay:
  host: 0.0.0.0
  port: 8787
  publicBaseUrl: https://YOUR_RELAY_HOST              # public HTTPS URL used by Telegram Mini Apps
  locale: auto                                        # auto, en, or zh-CN for relay pages and relay-owned transport text
  secret: replace-with-a-long-random-secret           # required; matches transports[type=relay].secret on the desktop side
  storePath: /var/lib/legax-relay/relay-store.json
  audit:
    enabled: true
    path: /var/lib/legax-relay/relay-audit.jsonl
    maxTail: 1000
    textPreview: 0
