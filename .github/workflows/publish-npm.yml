name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Run CI gate
        env:
          LEGAX_SECRET: ci-placeholder-secret
        run: npm run ci

      - name: Publish relay
        run: npm publish --workspace @legax/relay --access public --provenance

      - name: Publish daemon
        run: npm publish --workspace @legax/daemon --access public --provenance

      - name: Publish CLI
        run: npm publish --workspace legax --access public --provenance
