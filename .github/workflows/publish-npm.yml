name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Run CI gate
        run: npm run ci

      - name: Publish relay
        run: npm publish --workspace @legax/relay

      - name: Publish daemon
        run: npm publish --workspace @legax/daemon

      - name: Publish CLI
        run: npm publish --workspace legax
