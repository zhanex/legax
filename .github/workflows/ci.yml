name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: CI gate (Node ${{ matrix.node }} / ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: "18"
          - os: ubuntu-latest
            node: "20"
          - os: ubuntu-latest
            node: "22"
          - os: windows-latest
            node: "20"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Run CI gate
        env:
          # Required by simple-relay-server during e2e setup; tests inject their own.
          LEGAX_SECRET: ci-placeholder-secret
        run: npm run ci
