name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: CI gate (Node ${{ matrix.node }} / ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: "18"
          - os: ubuntu-latest
            node: "20"
          - os: ubuntu-latest
            node: "22"
          - os: windows-latest
            node: "20"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ matrix.node }}

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Run CI gate
        env:
          # Required by simple-relay-server during e2e setup; tests inject their own.
          LEGAX_SECRET: ci-placeholder-secret
        run: npm run ci
